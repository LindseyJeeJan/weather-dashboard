<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./favicon-512.png" />
  <link rel="shortcut icon" href="./favicon.ico" />
  <title>Weather Dashboard</title>
</head>

<body>
  <header>
    <h1>Weather Dashboard</h1>
  </header>

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <label class="search-label" for="search">Search City</label>
      <div class="search-row">
        <input id="search" type="search" autocomplete="off" class="search-input" placeholder="City Name" aria-label="Search for a city" name="search">
        <button id="btn-search" class="search-btn" type="button" aria-label="search">
          <i aria-hidden="true" class="fas fa-search"></i>
        </button>
      </div>

      <div id="error" style="display: none;" class="error-alert">
        <i class="fas fa-exclamation-triangle"></i>
        <span class="bold">Error:</span>
        Enter a city name to perform a search.
      </div>
      <div id="error-city" style="display: none;" class="error-alert">
        <i class="fas fa-exclamation-triangle"></i>
        <span class="bold">Error:</span>
        City not found. Enter a new city name.
      </div>
      <div id="error-comma" style="display: none;" class="error-alert">
        <i class="fas fa-exclamation-triangle"></i>
        <span class="bold">Error:</span>
        Try searching city name only. Do not include the state.
      </div>

      <div id="history-header">
        <h5 class="history-title">Search History <small><i class="far fa-clock"></i></small></h5>
        <a style="display: none;" href class="clear-history">clear</a>
      </div>
      <ul id="city-list" class="city-list">
        <li class="empty-list">No history exists.</li>
      </ul>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

      <!-- Current weather -->
      <div class="current-weather">
        <div class="weather-top">
          <div class="city-date">
            <h2><span id="cityName"></span></h2>
            <div id="todaysDate"></div>
          </div>
          <div class="weather-right">
            <img aria-hidden="true" id="h2-card-image" class="card-image" />
            <span id="temperature"></span>
          </div>
        </div>
        <div class="weather-stats">
          <div class="stat-pill"><span id="humidity"></span></div>
          <div class="stat-pill"><span id="wind-speed"></span></div>
          <div class="stat-pill uv-pill">
            <span id="uv-index">UV Index: </span><span class="badge p-2"></span>
          </div>
        </div>
      </div>

      <!-- 5-day forecast -->
      <section class="forecast">
        <h2 class="mb-4 pt-4"></h2>
        <div class="forecast-grid">

          <!-- Card 1 -->
          <div class="card">
            <h5 class="card-title bold"></h5>
            <img aria-hidden="true" class="card-image" />
            <span class="temperature"></span>
            <span class="humidity"></span>
          </div>

          <!-- Card 2 -->
          <div class="card">
            <h5 class="card-title bold"></h5>
            <img aria-hidden="true" class="card-image" />
            <span class="temperature"></span>
            <span class="humidity"></span>
          </div>

          <!-- Card 3 -->
          <div class="card">
            <h5 class="card-title bold"></h5>
            <img aria-hidden="true" class="card-image" />
            <span class="temperature"></span>
            <span class="humidity"></span>
          </div>

          <!-- Card 4 -->
          <div class="card">
            <h5 class="card-title bold"></h5>
            <img aria-hidden="true" class="card-image" />
            <span class="temperature"></span>
            <span class="humidity"></span>
          </div>

          <!-- Card 5 -->
          <div class="card">
            <h5 class="card-title bold"></h5>
            <img aria-hidden="true" class="card-image" />
            <span class="temperature"></span>
            <span class="humidity"></span>
          </div>

        </div>
      </section>

    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.24.0/moment.min.js"></script>
  <script src="./assets/js/script.js"></script>
</body>

</html>
